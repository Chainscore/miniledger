<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="12" fill="url(#bg)"/>
  <rect width="900" height="260" rx="12" stroke="#2a3444" stroke-width="1" fill="none"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="900" y2="50" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#3b82f6" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="260" stroke="#3b82f6" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="260" stroke="#3b82f6" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="260" stroke="#3b82f6" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="260" stroke="#3b82f6" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="260" stroke="#3b82f6" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="260" stroke="#3b82f6" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="260" stroke="#3b82f6" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="260" stroke="#3b82f6" stroke-width="1"/>
  </g>

  <!-- Icon: Three interconnected blocks -->
  <g transform="translate(80, 55)">
    <!-- Block 1 -->
    <rect x="0" y="40" width="50" height="50" rx="8" fill="url(#g1)" opacity="0.85"/>
    <rect x="8" y="52" width="34" height="4" rx="2" fill="white" opacity="0.5"/>
    <rect x="8" y="60" width="24" height="4" rx="2" fill="white" opacity="0.35"/>
    <rect x="8" y="68" width="30" height="4" rx="2" fill="white" opacity="0.25"/>

    <!-- Connector 1-2 -->
    <line x1="50" y1="65" x2="74" y2="60" stroke="url(#g1)" stroke-width="2.5" stroke-dasharray="4,3"/>

    <!-- Block 2 (center, larger) -->
    <rect x="74" y="24" width="68" height="68" rx="10" fill="url(#g1)"/>
    <rect x="84" y="38" width="48" height="4" rx="2" fill="white" opacity="0.55"/>
    <rect x="84" y="46" width="34" height="4" rx="2" fill="white" opacity="0.4"/>
    <rect x="84" y="54" width="42" height="4" rx="2" fill="white" opacity="0.3"/>
    <rect x="84" y="62" width="28" height="4" rx="2" fill="white" opacity="0.2"/>

    <!-- Connector 2-3 -->
    <line x1="142" y1="58" x2="166" y2="55" stroke="url(#g2)" stroke-width="2.5" stroke-dasharray="4,3"/>

    <!-- Block 3 -->
    <rect x="166" y="30" width="50" height="50" rx="8" fill="url(#g2)" opacity="0.85"/>
    <rect x="174" y="42" width="34" height="4" rx="2" fill="white" opacity="0.5"/>
    <rect x="174" y="50" width="24" height="4" rx="2" fill="white" opacity="0.35"/>
    <rect x="174" y="58" width="30" height="4" rx="2" fill="white" opacity="0.25"/>

    <!-- Chain arc -->
    <path d="M 25 40 Q 25 10 108 5 Q 191 0 191 30" stroke="url(#g1)" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="5,4"/>
  </g>

  <!-- Text: MiniLedger -->
  <text x="370" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="60" font-weight="700" letter-spacing="-2">
    <tspan fill="#3b82f6">Mini</tspan><tspan fill="#e2e8f0">Ledger</tspan>
  </text>

  <!-- Tagline -->
  <text x="372" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#8892a4" letter-spacing="0.5">
    The SQLite of private blockchains
  </text>

  <!-- Feature pills -->
  <g transform="translate(372, 172)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#1e3a5f"/>
    <text x="45" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="500">Zero Config</text>

    <rect x="100" y="0" width="100" height="26" rx="13" fill="#1e3a5f"/>
    <text x="150" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="500">SQL Queries</text>

    <rect x="210" y="0" width="110" height="26" rx="13" fill="#1e3a5f"/>
    <text x="265" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="500">Raft Consensus</text>

    <rect x="330" y="0" width="120" height="26" rx="13" fill="#1e3a5f"/>
    <text x="390" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="500">Smart Contracts</text>
  </g>
</svg>
