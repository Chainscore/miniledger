<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" fill="none">
  <!-- Clean dark background -->
  <rect width="900" height="240" fill="#0f1114"/>

  <!-- Thin top accent line -->
  <rect x="0" y="0" width="900" height="3" fill="#3b82f6"/>

  <!-- Product name -->
  <text x="60" y="105" font-family="'IBM Plex Sans', 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="600" letter-spacing="-1.5" fill="#ffffff">
    MiniLedger
  </text>

  <!-- Divider -->
  <rect x="60" y="125" width="60" height="2" fill="#3b82f6"/>

  <!-- Subtitle -->
  <text x="60" y="158" font-family="'IBM Plex Sans', 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#8b949e">
    Private Blockchain Framework for Node.js
  </text>

  <!-- Descriptor line -->
  <text x="60" y="188" font-family="'IBM Plex Mono', 'SF Mono', Consolas, monospace" font-size="13" font-weight="400" fill="#484f58" letter-spacing="0.5">
    Zero-config · SQL-queryable · Raft consensus · Embeddable
  </text>

  <!-- Install command, right-aligned -->
  <text x="840" y="218" font-family="'IBM Plex Mono', 'SF Mono', Consolas, monospace" font-size="13" font-weight="400" fill="#3b82f6" text-anchor="end">
    npm install miniledger
  </text>
</svg>
