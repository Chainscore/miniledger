<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Three interconnected blocks forming a chain -->
  <g transform="translate(20, 30)">
    <!-- Block 1 -->
    <rect x="0" y="40" width="50" height="50" rx="8" fill="url(#grad1)" opacity="0.9"/>
    <rect x="8" y="52" width="34" height="4" rx="2" fill="white" opacity="0.6"/>
    <rect x="8" y="60" width="24" height="4" rx="2" fill="white" opacity="0.4"/>
    <rect x="8" y="68" width="30" height="4" rx="2" fill="white" opacity="0.3"/>

    <!-- Connector 1-2 -->
    <line x1="50" y1="65" x2="70" y2="65" stroke="url(#grad1)" stroke-width="3" stroke-dasharray="4,3"/>

    <!-- Block 2 (center, larger) -->
    <rect x="70" y="28" width="64" height="64" rx="10" fill="url(#grad1)"/>
    <rect x="80" y="42" width="44" height="4" rx="2" fill="white" opacity="0.6"/>
    <rect x="80" y="50" width="32" height="4" rx="2" fill="white" opacity="0.4"/>
    <rect x="80" y="58" width="38" height="4" rx="2" fill="white" opacity="0.3"/>
    <rect x="80" y="66" width="26" height="4" rx="2" fill="white" opacity="0.2"/>

    <!-- Connector 2-3 -->
    <line x1="134" y1="60" x2="154" y2="60" stroke="url(#grad2)" stroke-width="3" stroke-dasharray="4,3"/>

    <!-- Block 3 -->
    <rect x="154" y="35" width="50" height="50" rx="8" fill="url(#grad2)" opacity="0.9"/>
    <rect x="162" y="47" width="34" height="4" rx="2" fill="white" opacity="0.6"/>
    <rect x="162" y="55" width="24" height="4" rx="2" fill="white" opacity="0.4"/>
    <rect x="162" y="63" width="30" height="4" rx="2" fill="white" opacity="0.3"/>

    <!-- Subtle chain loop back -->
    <path d="M 25 40 Q 25 15 100 10 Q 175 5 179 35" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.25" stroke-dasharray="6,4"/>
  </g>

  <!-- Text: MiniLedger -->
  <text x="244" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#3b82f6">Mini</tspan><tspan fill="#e2e8f0">Ledger</tspan>
  </text>

  <!-- Tagline -->
  <text x="246" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#8892a4" letter-spacing="0.5">
    The SQLite of private blockchains
  </text>
</svg>
